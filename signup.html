<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Vault | Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0b10; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid #333; width: 320px; text-align: center; }
        h2 { font-family: 'Orbitron'; color: #00f2ff; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #1a1a1a; border: 1px solid #444; border-radius: 5px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: linear-gradient(45deg, #00f2ff, #bc13fe); border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        #recaptcha-container { margin: 10px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h2>NEW HACKER</h2>
        
        <div id="form-box">
            <input type="text" id="user" placeholder="Create Username">
            <input type="email" id="email" placeholder="Email Address">
            <input type="text" id="phone" placeholder="+91 Mobile Number">
            <input type="password" id="pass" placeholder="Create Password">
            <div id="recaptcha-container"></div>
            <button id="btn-send">SEND OTP</button>
        </div>

        <div id="otp-box" style="display:none;">
            <input type="text" id="otp" placeholder="Enter OTP">
            <button id="btn-verify">VERIFY & REGISTER</button>
        </div>
        
        <p id="status" style="font-size: 12px; margin-top: 10px; color: cyan;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfD3iPlJPPW5TCg-gkuKYNzC4qc-6YOYU", 
            authDomain: "project-b2602.firebaseapp.com",
            projectId: "project-b2602",
            storageBucket: "project-b2602.appspot.com",
            messagingSenderId: "406839109753",
            appId: "1:406839109753:web:dcf6f5077f8d93c98a8ca8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
    'size': 'normal',
    'callback': (response) => {
        
    }
});

        document.getElementById('btn-send').addEventListener('click', () => {
            const phone = document.getElementById('phone').value;
            signInWithPhoneNumber(auth, phone, window.recaptchaVerifier)
                .then(res => {
                    window.confirmationResult = res;
                    document.getElementById('form-box').style.display = 'none';
                    document.getElementById('otp-box').style.display = 'block';
                    document.getElementById('status').innerText = "Check your phone!";
                }).catch(err => alert(err.message));
        });

        
        document.getElementById('btn-verify').addEventListener('click', async () => {
            const code = document.getElementById('otp').value;
            const username = document.getElementById('user').value;
            
            try {
                await confirmationResult.confirm(code);
            
                await setDoc(doc(db, "users", username), {
                    username: username,
                    email: document.getElementById('email').value,
                    password: document.getElementById('pass').value,
                    phone: document.getElementById('phone').value
                });
                alert("Account Created! Use your username to login.");
                window.location.href = "index.html"; 
            } catch (err) { alert("Invalid OTP!"); }
        });
    </script>
</body>
</html>
