<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Vault | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0b10; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid #333; width: 320px; text-align: center; }
        h2 { font-family: 'Orbitron'; color: #bc13fe; text-shadow: 0 0 10px #bc13fe; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1a1a1a; border: 1px solid #444; border-radius: 5px; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: linear-gradient(45deg, #bc13fe, #00f2ff); border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .link { font-size: 13px; margin-top: 20px; color: #00f2ff; text-decoration: none; display: block; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>SYSTEM LOGIN</h2>
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <button id="btn-login">ACCESS VAULT</button>
        <a href="signup.html" class="link">New Hacker? Create Account</a>
        <p id="msg" style="font-size: 12px; margin-top: 10px;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfD3iPlJPPW5TCg-gkuKYNzC4qc-6YOYU", 
            authDomain: "project-b2602.firebaseapp.com",
            projectId: "project-b2602",
            storageBucket: "project-b2602.appspot.com",
            messagingSenderId: "406839109753",
            appId: "1:406839109753:web:dcf6f5077f8d93c98a8ca8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('btn-login').addEventListener('click', async () => {
            const username = document.getElementById('login-username').value;
            const pass = document.getElementById('login-password').value;
            const userDoc = await getDoc(doc(db, "users", username));

            if (userDoc.exists() && userDoc.data().password === pass) {
                localStorage.setItem("isLoggedIn", "true");
                window.location.href = "photos.html";
            } else {
                document.getElementById('msg').innerText = "Invalid Credentials!";
            }
        });
    </script>
</body>
</html>
